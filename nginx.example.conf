# websh nginx reverse proxy (HTTPS).
# Service workers AND Web Push both require a secure context (HTTPS), so TLS is
# mandatory — a self-signed cert works on a LAN/ZeroTier address as long as the
# phone trusts it, otherwise SW registration silently fails.

server {
    listen 443 ssl;
    server_name websh.example.com;

    ssl_certificate     /etc/nginx/certs/websh.crt;
    ssl_certificate_key /etc/nginx/certs/websh.key;

    location / {
        proxy_pass http://127.0.0.1:9631;
        proxy_http_version 1.1;

        # WebSocket upgrade
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Keep long-lived terminal websockets open; the app also heartbeats.
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
        proxy_buffering     off;
    }
}

# Redirect HTTP -> HTTPS
server {
    listen 80;
    server_name websh.example.com;
    return 301 https://$host$request_uri;
}

# ---------------------------------------------------------------------------
# Sub-path deployment (e.g. https://host/websh/ -> 127.0.0.1:9636)
#
# The TRAILING SLASH on proxy_pass is required: it strips the /websh/ prefix so
# the backend sees /, /api/..., /ws/term/... (the frontend auto-detects the
# /websh/ base from its own script URL). The Upgrade/Connection headers MUST be
# present on this location too, or the terminal websocket silently fails with
# "can't establish a connection".
#
#   location /websh/ {
#       proxy_pass http://127.0.0.1:9636/;     # <-- trailing slash strips /websh/
