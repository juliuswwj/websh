# Example websh user config (~/.config/websh.yaml).
# If this file does not exist, the user cannot log in.
#
# The easiest way to create this file is:  websh config
# (it generates the OTP secret and shows a QR code to scan). This sample is for
# reference / manual editing.

# Required. Base32 TOTP secret, Google Authenticator compatible.
# `websh config` fills this in; to make one by hand: head -c20 /dev/urandom | base32
otp_secret: "JBSWY3DPEHPK3PXP"

# Optional display name.
display_name: "Wen Jun"

# Optional x-workbench (xwb) account. Required only if you add `type: xwb`
# remotes below. The email/password log in to x-workbench to obtain a JWT
# (cached under ~/.cache/websh/); the websocket to xwb is unstable, so websh
# reconnects automatically.
# xwb:
#   host: "172.60.1.35:9630"      # upstream x-workbench host:port
#   email: "you@lango-tech.com"
#   password: "••••••"

# Quick-connects. Local shells are NOT configured here — create them in the UI
# with "+ new bash". ssh remotes connect with this user's own ~/.ssh keys; xwb
# remotes connect through the xwb account above.
remotes:
  # Each remote can hold MANY sessions, shown as "0@<id>", "1@<id>", … (tmux
  # session 0, 1, … on the remote). The id is the part after "@", so set a short
  # id (e.g. "server") for a clean "0@server".
  - host: "gpu01.internal"     # required; the session id is derived from it
    id: "gpu01"                # optional; the "@id" label (default = slugified host)
    name: "GPU 01"             # optional display name (defaults to host)
    user: "deploy"             # optional ssh login user
    port: 22                   # optional
    ssh_options:               # optional; ProxyCommand/LocalCommand rejected
      - "-o"
      - "ServerAliveInterval=30"

  # id is derived from host ("gpu01_internal" above). Set it explicitly only to
  # disambiguate two remotes on the same host:
  # - id: db-ro
  #   host: "db.internal"
  #   user: "readonly"

  # An x-workbench server. Name it by its IP within xwb; server_id and
  # credential_id are resolved at runtime via the xwb API. Each such server
  # offers both a Bash and a Claude tab in the picker.
  # - type: xwb
  #   ip: "10.0.0.5"             # required; the server's IP inside x-workbench
  #   id: "gpu5"                 # optional; the "@id" label (default = slugified ip)
  #   name: "GPU 5"             # optional display name (defaults to ip)
  #   credential_id: 219         # optional; default = auto-resolved (default/verified/first)
