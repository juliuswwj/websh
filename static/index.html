<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="theme-color" content="#0d1117" />
<link rel="manifest" href="manifest.json" />
<link rel="apple-touch-icon" href="icons/icon-192.png" />
<title>websh</title>
<link rel="stylesheet" href="vendor/xterm.css" />
<style>
:root{
  --bg:#0d1117; --bg2:#161b22; --bg3:#21262d; --line:#30363d;
  --fg:#e6edf3; --mut:#8b949e; --acc:#2f81f7; --ok:#3fb950; --err:#f85149;
  --tabh:42px; --barh:46px;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{margin:0;height:100%;background:var(--bg);color:var(--fg);
  font:15px/1.4 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  overscroll-behavior:none;}
#app{height:100dvh;display:flex;flex-direction:column;}
.hidden{display:none !important;}
button{font:inherit;color:inherit;background:var(--bg3);border:1px solid var(--line);
  border-radius:8px;padding:9px 12px;cursor:pointer;}
button:active{background:var(--acc);border-color:var(--acc);}
button.ghost{background:transparent;}
input{font:inherit;color:inherit;background:var(--bg);border:1px solid var(--line);
  border-radius:8px;padding:11px 12px;width:100%;}
.row{display:flex;gap:8px;align-items:center;}
.grow{flex:1;min-width:0;}
.mut{color:var(--mut);}
.err{color:var(--err);}

/* ---- 登录 ---- */
#login{flex:1;display:flex;flex-direction:column;justify-content:center;
  padding:24px;max-width:420px;margin:0 auto;width:100%;gap:14px;}
#login h1{font-size:22px;margin:0 0 4px;}
#login .sub{color:var(--mut);font-size:13px;margin-bottom:8px;}

/* ---- 顶栏 ---- */
header{height:var(--barh);min-height:var(--barh);display:flex;align-items:center;
  gap:8px;padding:0 10px;background:var(--bg2);border-bottom:1px solid var(--line);
  padding-top:env(safe-area-inset-top);}
header .title{font-weight:600;font-size:15px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
header button{padding:6px 10px;font-size:13px;}

/* ---- 会话列表 ---- */
#sessions{flex:1;overflow:auto;padding:12px;display:flex;flex-direction:column;gap:10px;}
.srv{background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:14px;
  display:flex;align-items:center;gap:12px;}
.srv:active{border-color:var(--acc);}
.srv .ic{font-size:22px;}
.srv .meta{flex:1;min-width:0;}
.srv .name{font-weight:600;font-size:15px;word-break:break-all;}
.srv .desc{color:var(--mut);font-size:12px;margin-top:2px;}
.srv .dot{width:8px;height:8px;border-radius:50%;background:var(--mut);}
.srv .dot.live{background:var(--ok);}
#notifyBar{margin:0 12px;}
#notifyBar button{width:100%;border-color:var(--acc);color:var(--acc);}

/* ---- 工作区 ---- */
#work{flex:1;display:flex;flex-direction:column;min-height:0;}
.tabbar{display:flex;height:var(--tabh);min-height:var(--tabh);background:var(--bg2);
  border-bottom:1px solid var(--line);overflow-x:auto;overflow-y:hidden;}
.tabbar::-webkit-scrollbar{display:none;}
.tab{display:flex;align-items:center;gap:6px;padding:0 14px;white-space:nowrap;
  border-right:1px solid var(--line);color:var(--mut);font-size:13px;}
.tab.active{color:var(--fg);background:var(--bg);box-shadow:inset 0 -2px 0 var(--acc);}
.tab .tabx{margin-left:2px;color:var(--mut);font-size:16px;line-height:1;padding:2px 4px;border-radius:6px;}
.tab .tabx:active{background:var(--err);color:#fff;}
.tab .dot{width:7px;height:7px;border-radius:50%;background:var(--mut);}
.tab .dot.on{background:var(--ok);}
.tab .dot.err{background:var(--err);}
.tab .dot.wait{background:#d29922;}

.pane{flex:1;min-height:0;position:relative;}
.view{position:absolute;inset:0;display:flex;flex-direction:column;}

/* ---- 终端 ---- */
.term-wrap{flex:1;min-height:0;background:#000;}
.term-wrap .xterm{height:100%;padding:4px;}
.termbar{display:flex;gap:6px;padding:6px;background:var(--bg2);
  border-top:1px solid var(--line);overflow-x:auto;padding-bottom:calc(6px + env(safe-area-inset-bottom));}
.termbar::-webkit-scrollbar{display:none;}
.termbar button{padding:7px 10px;font-size:12px;min-width:40px;flex:0 0 auto;}
.termbar button.modebtn{background:var(--acc);border-color:var(--acc);color:#fff;font-weight:600;position:sticky;left:0;z-index:1;}
.cmdbar{display:flex;gap:6px;padding:6px;background:var(--bg2);border-top:1px solid var(--line);}
.cmdbar input{font-family:ui-monospace,monospace;}

.copyov{position:fixed;inset:0;z-index:90;background:var(--bg);display:flex;flex-direction:column;
  padding-top:env(safe-area-inset-top);}
.copybar{display:flex;gap:8px;align-items:center;padding:10px;background:var(--bg2);
  border-bottom:1px solid var(--line);}
.copyta{flex:1;width:100%;border:0;border-radius:0;background:#000;color:#e6edf3;
  font-family:ui-monospace,monospace;font-size:13px;padding:10px;resize:none;
  -webkit-user-select:text;user-select:text;}
#toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);
  background:var(--bg3);border:1px solid var(--line);border-radius:10px;
  padding:10px 16px;font-size:13px;max-width:90%;z-index:50;opacity:0;
  transition:opacity .2s;pointer-events:none;}
#toast.show{opacity:1;}
</style>
</head>
<body>
<div id="app">
  <!-- 登录 -->
  <section id="login">
    <h1>websh</h1>
    <div class="sub">用本机账号登录（需配置 ~/.config/websh.yaml）</div>
    <input id="username" type="text" placeholder="用户名" autocomplete="username" autocapitalize="off" autocorrect="off" />
    <input id="otp" type="text" inputmode="numeric" maxlength="6"
           placeholder="动态验证码（6位）" autocomplete="one-time-code" />
    <input id="password" type="password" placeholder="密码" autocomplete="current-password" />
    <button id="loginBtn">登录</button>
    <div id="loginErr" class="err"></div>
  </section>

  <!-- 会话列表 -->
  <header id="srvHeader" class="hidden">
    <span class="title grow">选择会话</span>
    <button id="logoutBtn" class="ghost">退出</button>
  </header>
  <div id="notifyBar" class="hidden"><button id="notifyBtn">🔔 开启通知</button></div>
  <section id="sessions" class="hidden"></section>

  <!-- 工作区 -->
  <header id="workHeader" class="hidden">
    <button id="backBtn" class="ghost">‹ 返回</button>
    <span class="title grow" id="workTitle"></span>
    <button id="fontDec" class="ghost">A-</button>
    <button id="fontInc" class="ghost">A+</button>
  </header>
  <section id="work" class="hidden">
    <div class="tabbar" id="tabbar"></div>
    <div class="pane" id="pane"></div>
  </section>
</div>

<div id="toast"></div>

<script src="vendor/xterm.js"></script>
<script src="vendor/addon-fit.js"></script>
<script src="app.js"></script>
</body>
</html>
